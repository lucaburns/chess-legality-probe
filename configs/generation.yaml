project:
  name: chess-legality-probe
  stage: generation

paths:
  chess_gpt_eval_repo: ../chess_gpt_eval
  checkpoint: stockfish_16layers_ckpt_no_optimizer.pt
  output_dataset: data/stockfish16_t1p3_n4000.pt

generation:
  device: auto
  positions: 4000
  max_plies: 120
  temperature: 1.3
  top_k: 200
  max_new_tokens: 10
  random_opening_plies: 2
  stop_on_illegal: true
  seed: 7

notes:
  purpose: >
    Dataset-generation settings for running Chess-GPT self-play, caching
    residual activations, and writing a reusable dataset for later probe
    experiments.
