<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/></marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/></marker>
    <style>
      .title{font:700 34px Arial, sans-serif; fill:#0f172a} .subtitle{font:400 18px Arial, sans-serif; fill:#475569}
      .label{font:700 17px Arial, sans-serif; fill:#0f172a} .small{font:400 14px Arial, sans-serif; fill:#475569}
      .tiny{font:400 12px Arial, sans-serif; fill:#64748b} .mono{font:500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#0f172a}
      .piece{font:700 38px Arial, sans-serif; fill:#0f172a} .badge{font:700 14px Arial, sans-serif; fill:#ffffff}
    </style>
  </defs><rect width="100%" height="100%" fill="#f8fafc"/>
<text x="60" y="70" class="title" text-anchor="start">Generated move labeling pipeline</text>
<text x="60" y="102" class="subtitle" text-anchor="start">The model generates a move, then a chess rules engine assigns the legality label used for probes.</text>
<rect x="70" y="185" width="235" height="120" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="1" filter="url(#shadow)"/>
<text x="95" y="232" class="label" text-anchor="start">Chess-GPT prompt</text>
<text x="95" y="265" class="small" text-anchor="start">Position text before move</text>
<line x1="315" y1="245" x2="322" y2="245" stroke="#334155" stroke-width="5" marker-end="url(#arrow-blue)"/><rect x="340" y="185" width="235" height="120" rx="22" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
<text x="365" y="232" class="label" text-anchor="start">Generated move</text>
<text x="365" y="265" class="small" text-anchor="start">Example: Bd2 or O-O</text>
<line x1="585" y1="245" x2="592" y2="245" stroke="#334155" stroke-width="5" marker-end="url(#arrow-blue)"/><rect x="610" y="185" width="235" height="120" rx="22" fill="#fef3c7" stroke="#d97706" stroke-width="1" filter="url(#shadow)"/>
<text x="635" y="232" class="label" text-anchor="start">Rules engine</text>
<text x="635" y="265" class="small" text-anchor="start">Apply full legal-move rules</text>
<line x1="855" y1="245" x2="862" y2="245" stroke="#334155" stroke-width="5" marker-end="url(#arrow-blue)"/><rect x="880" y="185" width="235" height="120" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="1" filter="url(#shadow)"/>
<text x="905" y="232" class="label" text-anchor="start">Training label</text>
<text x="905" y="265" class="small" text-anchor="start">legal = 0 / illegal = 1</text>
<rect x="190" y="405" width="400" height="130" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<rect x="220" y="432" width="80" height="28" rx="14.0" fill="#16a34a"/><text x="260.0" y="451.0" class="badge" text-anchor="middle">LEGAL</text>
<text x="220" y="485" class="label" text-anchor="start">Bd2 resolves check by blocking the bishop.</text>
<rect x="650" y="405" width="440" height="130" rx="20" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
<rect x="680" y="432" width="88" height="28" rx="14.0" fill="#dc2626"/><text x="724.0" y="451.0" class="badge" text-anchor="middle">ILLEGAL</text>
<text x="680" y="485" class="label" text-anchor="start">O-O fails because castling out of check is illegal.</text>
</svg>
