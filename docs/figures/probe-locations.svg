<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/></marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/></marker>
    <style>
      .title{font:700 34px Arial, sans-serif; fill:#0f172a} .subtitle{font:400 18px Arial, sans-serif; fill:#475569}
      .label{font:700 17px Arial, sans-serif; fill:#0f172a} .small{font:400 14px Arial, sans-serif; fill:#475569}
      .tiny{font:400 12px Arial, sans-serif; fill:#64748b} .mono{font:500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#0f172a}
      .piece{font:700 38px Arial, sans-serif; fill:#0f172a} .badge{font:700 14px Arial, sans-serif; fill:#ffffff}
    </style>
  </defs><rect width="100%" height="100%" fill="#f8fafc"/>
<text x="60" y="70" class="title" text-anchor="start">Probe experiments across activation representations</text>
<text x="60" y="102" class="subtitle" text-anchor="start">Different probe families inspect different internal representations during the same forward pass.</text>
<rect x="110" y="170" width="270" height="58" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
<text x="138" y="206" class="label" text-anchor="start">Layer 1</text>
<circle cx="330" cy="199" r="16" fill="#dbeafe" stroke="#2563eb"/><text x="330" y="204" class="mono" text-anchor="middle">h</text>
<rect x="110" y="255" width="270" height="58" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
<text x="138" y="291" class="label" text-anchor="start">Layer 2</text>
<circle cx="330" cy="284" r="16" fill="#dbeafe" stroke="#2563eb"/><text x="330" y="289" class="mono" text-anchor="middle">h</text>
<rect x="110" y="340" width="270" height="58" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
<text x="138" y="376" class="label" text-anchor="start">Layer 3</text>
<circle cx="330" cy="369" r="16" fill="#dbeafe" stroke="#2563eb"/><text x="330" y="374" class="mono" text-anchor="middle">h</text>
<rect x="110" y="425" width="270" height="58" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
<text x="138" y="461" class="label" text-anchor="start">Layer 4</text>
<circle cx="330" cy="454" r="16" fill="#dbeafe" stroke="#2563eb"/><text x="330" y="459" class="mono" text-anchor="middle">h</text>
<rect x="110" y="510" width="270" height="58" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
<text x="138" y="546" class="label" text-anchor="start">Layer 5</text>
<circle cx="330" cy="539" r="16" fill="#dbeafe" stroke="#2563eb"/><text x="330" y="544" class="mono" text-anchor="middle">h</text>
<line x1="420" y1="175" x2="420" y2="575" stroke="#334155" stroke-width="8" stroke-linecap="round"/><text x="200" y="610" class="small" text-anchor="start">Residual stream activations (Layer i)</text>
<line x1="430" y1="220" x2="505" y2="220" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow-blue)"/><rect x="520" y="185" width="520" height="82" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
<text x="550" y="219" class="label" text-anchor="start">Linear probe</text>
<text x="550" y="247" class="small" text-anchor="start">Tests linear separability of legality</text>
<line x1="430" y1="360" x2="505" y2="360" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrow-purple)"/><rect x="520" y="325" width="520" height="82" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
<text x="550" y="359" class="label" text-anchor="start">MLP probe</text>
<text x="550" y="387" class="small" text-anchor="start">Tests nonlinear separability of legality</text>
<line x1="430" y1="500" x2="505" y2="500" stroke="#d97706" stroke-width="5" marker-end="url(#arrow-red)"/><rect x="520" y="465" width="520" height="82" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="550" y="499" class="label" text-anchor="start">Neuron-level probe</text>
<text x="550" y="527" class="small" text-anchor="start">Tests which individual neurons are most predictive of legality</text>
<rect x="520" y="585" width="520" height="58" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
<text x="550" y="622" class="label" text-anchor="start">Output: P(illegal move | activation) evaluated via AUROC</text>
